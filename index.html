<!DOCTYPE html>
<html>
<head>
  <title>Meri Dukaan</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    .header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
    .products { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
    .card { background: white; width: 250px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px #ccc; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    .price { color: green; font-size: 20px; font-weight: bold; }
    .btn { background: #27ae60; color: white; border: none; padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; border-radius: 5px; }
    .btn:hover { background: #219a52; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Meri Online Dukaan</h1>
    <p>WhatsApp par order karein: 03228241585</p>
  </div>

  <div class="products">
    <div class="card">
      <img src="https://via.placeholder.com/250x200" alt="Product 1">
      <h3>mens nike shoes 1</h3>
      <p>Ye product ki detail hai. 1-2 line ka description.</p>
      <p class="price">Rs. 1500</p>
      <button class="btn" onclick="order('Product Ka Naam 1', 1500)">Order Karein</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250x200" alt="Product 2">
      <h3>earbuds 2</h3>
      <p>Ye product ki detail hai. 1-2 line ka description.</p>
      <p class="price">Rs. 2500</p>
      <button class="btn" onclick="order('Product Ka Naam 2', 2500)">Order Karein</button>
    </div>
  </div>

  <script>
    function order(name, price) {
      let number = "923228241585"; // Apna WhatsApp number yahan 92 ke sath likho
      let msg = `Salam! Mujhe ye product chahiye:%0A%0AProduct: ${name}%0APrice: Rs. ${price}`;
      window.open(`https://wa.me/${number}?text=${msg}`, '_blank');
    }
  </script>
</body>
</html>
